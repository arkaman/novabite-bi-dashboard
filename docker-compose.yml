services:

  backend:
    build:
      context: ./backend

    container_name: novabite-backend

    ports:
      - "8080:8080"

    environment:
      GEMINI_API_KEY: ${GEMINI_API_KEY}

  frontend:
    build:
      context: ./frontend

    container_name: novabite-frontend

    ports:
      - "5173:80"

    depends_on:
      - backend